<style>
/* Button */
button {
  padding: 14px 25px;
  border: none;
  border-radius: 25px;
  background: red;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

/* Popup Box */
.popup-box {
  background: #000;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.popup-box img {
  width: 220px;
}

/* Close Button */
.close {
  margin-top: 10px;
  background: #444;
}
</style>
</head>

<body>

<!-- Button -->
<button onclick="openPopup()">I've Made Payment →</button>

<!-- Popup -->
<div id="popup">
  <div class="popup-box">
    <h3 style="color:white;">Scan & Pay</h3>

    <!-- QR IMAGE -->
    <img src="https://i.ibb.co/DfLYSbdB/1000000193-2.jpg">

    <br>
    <button class="close" onclick="closePopup()">Close</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
